<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5f5f7">
  <title>PPTX Editor Engine</title>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">P</span>
        <div class="brand-text">
          <h1 id="doc-title">PPTX Editor Engine</h1>
          <span class="brand-subtitle" id="doc-subtitle">Precision rendering workspace</span>
        </div>
      </div>

      <div class="header-actions">
        <button id="btn-load-demo" class="button button-secondary" type="button">
          <span class="button-symbol" aria-hidden="true">◇</span>
          <span>示例文稿</span>
        </button>
        <label class="button button-primary">
          <span class="button-symbol" aria-hidden="true">↑</span>
          <span>上传 PPTX</span>
          <input type="file" id="file-uploader" accept=".pptx">
        </label>
      </div>
    </header>

    <div class="main-layout">
      <aside class="sidebar" aria-label="幻灯片缩略图">
        <div class="sidebar-heading">
          <span class="eyebrow">幻灯片</span>
          <span class="sidebar-count" id="sidebar-count">0</span>
        </div>
        <ol id="slide-list" class="slide-list">
          <li class="empty-slide-list">尚未加载演示文稿</li>
        </ol>
      </aside>

      <main id="viewport" class="viewport-area">
        <div id="stage" class="stage">
          <div id="canvas-wrapper" class="canvas-container"></div>
        </div>

        <div class="control-bar" aria-label="幻灯片控制">
          <button id="btn-prev" class="icon-button" type="button" aria-label="上一页" title="上一页" disabled>
            <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="15 18 9 12 15 6"></polyline></svg>
          </button>
          <span id="page-indicator" class="page-info">0 / 0</span>
          <button id="btn-next" class="icon-button" type="button" aria-label="下一页" title="下一页" disabled>
            <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="9 18 15 12 9 6"></polyline></svg>
          </button>
          <span class="control-divider" aria-hidden="true"></span>
          <label class="debug-toggle" title="显示或隐藏文本框调试边框">
            <input id="debug-text-boxes" type="checkbox">
            <span>文本框边界</span>
          </label>
        </div>

        <div id="dropzone" class="dropzone-overlay" aria-hidden="true">
          <div class="dropzone-box">
            <span class="dropzone-symbol" aria-hidden="true">↓</span>
            <strong>释放以打开演示文稿</strong>
            <span>支持 .pptx 文件</span>
          </div>
        </div>

        <div id="welcome-view" class="welcome-overlay">
          <div class="welcome-card">
            <span class="welcome-symbol" aria-hidden="true">P</span>
            <span class="eyebrow">PPTX EDITOR ENGINE</span>
            <h2>打开演示文稿</h2>
            <p>在保持页面比例的前提下查看精确渲染结果。</p>
            <div class="welcome-actions">
              <button id="btn-welcome-demo" class="button button-primary" type="button">载入示例</button>
              <button id="btn-welcome-upload" class="button button-secondary" type="button">选择文件</button>
            </div>
            <span class="welcome-note">也可以将 PPTX 拖入工作区</span>
          </div>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
